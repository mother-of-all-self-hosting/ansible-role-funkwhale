---
- name: (Deprecation) Catch and report renamed settings
  ansible.builtin.fail:
    msg: >-
      Your configuration contains a variable, which now has a different name.
      Please change your configuration to rename the variable (`{{ item.old }}` -> `{{ item.new }}`).
  when: "lookup('ansible.builtin.varnames', ('^' + item.old + '$'), wantlist=True) | length > 0"
  with_items:
    - { "old": "funkwhale_api_env_path", "new": "<Removed>" }
    - { "old": "funkwhale_api_tmpfs_size", "new": "funkwhale_api_container_tmpfs_tmp_size" }
    - { "old": "funkwhale_config_redis_hostname", "new": "funkwhale_redis_hostname" }
    - { "old": "funkwhale_config_redis_port", "new": "funkwhale_redis_port" }
    - { "old": "funkwhale_config_redis_database", "new": "funkwhale_redis_database" }
    - { "old": "funkwhale_config_redis_url", "new": "funkwhale_redis_url" }
    - { "old": "funkwhale_frontend_env_path", "new": "<Removed>" }
    - { "old": "funkwhale_api_http_header_content_permission_policy", "new": "funkwhale_api_http_header_permissions_policy" }
    - { "old": "funkwhale_frontend_http_header_content_permission_policy", "new": "funkwhale_frontend_http_header_permissions_policy" }
    - { "old": "funkwhale_email_protocol", "new": "funkwhale_api_environment_variables_email_config_protocol" }
    - { "old": "funkwhale_email_host", "new": "funkwhale_api_environment_variables_email_config_host" }
    - { "old": "funkwhale_email_port", "new": "funkwhale_api_environment_variables_email_config_port" }
    - { "old": "funkwhale_email_username", "new": "funkwhale_api_environment_variables_email_config_username" }
    - { "old": "funkwhale_email_password", "new": "funkwhale_api_environment_variables_email_config_password" }
    - { "old": "funkwhale_email_from", "new": "funkwhale_api_environment_variables_email_config_from" }
    - { "old": "funkwhale_account_email_verification_enforce", "new": "funkwhale_api_environment_variables_account_email_verification_enforce" }

- name: Fail if required Funkwhale settings not defined
  ansible.builtin.fail:
    msg: >-
      You need to define a required configuration setting (`{{ item }}`).
  when: "lookup('vars', item, default='') | string | length == 0"
  with_items:
    - funkwhale_uid
    - funkwhale_gid
    - funkwhale_hostname
    - funkwhale_path_prefix
    - funkwhale_container_network
    - funkwhale_database_hostname
    - funkwhale_database_username
    - funkwhale_database_password
    - funkwhale_django_secret_key
    - funkwhale_redis_hostname

- name: Run if Traefik is enabled for Funkwhale's API
  when: funkwhale_api_container_labels_traefik_enabled | bool
  block:
    - name: Fail if Traefik settings required for Funkwhale's API are not defined
      ansible.builtin.fail:
        msg: >-
          You need to define a required configuration setting (`{{ item }}`).
      when: "lookup('vars', item, default='') | string | length == 0"
      with_items:
        - funkwhale_api_container_labels_traefik_hostname
        - funkwhale_api_container_labels_traefik_path_prefix

    # We ensure it doesn't end with a slash, because we handle both (slash and no-slash).
    # Knowing that `funkwhale_api_container_labels_traefik_path_prefix` does not end with a slash
    # ensures we know how to set these routes up without having to do "does it end with a slash" checks elsewhere.
    - name: Fail if funkwhale_api_container_labels_traefik_path_prefix ends with a slash
      ansible.builtin.fail:
        msg: >-
          funkwhale_api_container_labels_traefik_path_prefix (`{{ funkwhale_api_container_labels_traefik_path_prefix }}`) must either be `/` or not end with a slash (e.g. `/funkwhale`).
      when: "funkwhale_api_container_labels_traefik_path_prefix != '/' and funkwhale_api_container_labels_traefik_path_prefix[-1] == '/'"
