---
- name: Fail if playbook called incorrectly
  ansible.builtin.fail:
    msg: "The `username`, `password`, and `email` variables need to be provided via --extra-vars"
  when: >-
    username is not defined or username == '<username>' or
    email is not defined or email == '<email>' or
    password is not defined or password == '<password>'

- name: Set the initial role to 'user' when running 'create-user-funkwhale'
  ansible.builtin.set_fact:
    initial_role: user
  tags:
    - create-user-funkwhale

- name: Set the initial role to 'admin' when running 'create-superuser-funkwhale' or 'create-admin-funkwhale'
  ansible.builtin.set_fact:
    initial_role: admin
  tags:
    - create-superuser-funkwhale
    - create-admin-funkwhale

- name: Set user details
  ansible.builtin.set_fact:
    user:
      username: "{{ username }}"
      initial_email: "{{ email }}"
      initial_password: "{{ password }}"
      initial_type: "{{ initial_role }}"

- name: Ensure Funkwhale API service is started
  ansible.builtin.service:
    name: "{{ funkwhale_api_identifier }}"
    state: started
    daemon_reload: true
  register: start_result

- name: Wait a while, so that the Funkwhale API instance can manage to start
  ansible.builtin.pause:
    seconds: 7
  when: "start_result.changed"

- name: "Ensure Funkwhale user is created - {{ user.username }}"
  ansible.builtin.include_tasks: "{{ role_path }}/tasks/util/ensure_user_registered.yml"
  no_log: true
