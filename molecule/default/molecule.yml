---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: docker
platforms:
  - name: funkwhale-${MOLECULE_DISTRO:-ubuntu2604}-default
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_result_format: yaml
  inventory:
    group_vars:
      all:
        # Variables for Funkwhale
        funkwhale_uid: 1000
        funkwhale_gid: 1000
        funkwhale_hostname: funkwhale
        funkwhale_frontend_container_http_host_bind_port: 80
        funkwhale_frontend_container_labels_traefik_enabled: false
        funkwhale_django_secret_key: secret
        funkwhale_watch_imports_enabled: false # Default value

        # Variables required for Funkwhale to connect to the Postgres database (via Unix socket)
        funkwhale_database_username: my_database_username
        funkwhale_database_password: my_database_password
        funkwhale_database_sslmode: disable
        funkwhale_database_name: funkwhale
        funkwhale_database_socket_enabled: true
        funkwhale_database_socket_path_host: "{{ postgres_run_path }}"
        funkwhale_api_systemd_required_services_list_auto: |
          {{
            (['postgres.service'])
          }}
        funkwhale_frontend_systemd_required_services_list_auto: |
          {{
            (['postgres.service'])
          }}

        # Variables required for Funkwhale to connect to the Valkey data-store
        funkwhale_redis_hostname: "{{ valkey_identifier }}"
        funkwhale_api_container_additional_networks_custom:
          - "{{ valkey_container_network }}"
        funkwhale_api_systemd_required_services_list_custom:
          - "{{ valkey_identifier }}.service"

        # Variables for Postgres
        postgres_uid: 1000
        postgres_gid: 1000
        postgres_connection_password: postgres_password
        postgres_container_unix_socket_enabled: true
        postgres_managed_databases: |
          {{
            [{
              'name': funkwhale_database_name,
              'username': funkwhale_database_username,
              'password': funkwhale_database_password,
            }]
          }}

        # Variables for Valkey
        valkey_uid: 1000
        valkey_gid: 1000
        valkey_arch: amd64
  env:
    # Workaround for https://github.com/ansible/molecule/issues/4391
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:~/.ansible/roles
scenario:
  # See: https://docs.ansible.com/projects/molecule/configuration/?h=test_sequence#scenario
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Disable idempotence test for now due to ansible-role-postgres
    # - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
